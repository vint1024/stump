name: CVE Check

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  yarn-audit:
    runs-on: ubuntu-latest
    # write for creating issue
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run yarn audit and create issue if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUDIT_OUTPUT=$(yarn audit --groups dependencies 2>&1 || true)

          if echo "$AUDIT_OUTPUT" | grep -q "vulnerabilities found"; then
            printf '```\n%s\n```\n' "$AUDIT_OUTPUT" > issue-body.txt
            gh issue create \
              --title "[CVE] Vulnerable dependencies detected — $(date -u +%Y-%m-%d)" \
              --body-file issue-body.txt \
              --label "security"
          fi
