	leaveBookClub(bookClubId: ID!): BookClubMember!
	"Add a book to the club's queue"
	addBookToClub(bookClubId: ID!, input: AddBookToClubInput!): BookClub!
	"Mark the current book as completed"
	completeBook(bookClubBookId: ID!): BookClub!
	"Reorder uncompleted books in the club's queue. Completed books cannot be reordered since they are effectively archived"
	reorderBooks(bookClubId: ID!, bookIds: [String!]!): BookClub!
	"Suggest a book for the book club"
	suggestBook(bookClubId: ID!, input: SuggestBookInput!): BookClubBookSuggestion!
	"Remove your own suggestion (only before it's resolved)"
	removeSuggestion(suggestionId: ID!): BookClubBookSuggestion!
	"Toggle like on a suggestion"
	toggleSuggestionLike(suggestionId: ID!): Boolean!
	"Update the status of a suggestion (Admin+)"
	updateSuggestionStatus(suggestionId: ID!, status: BookClubSuggestionStatus!, notes: String): BookClubBookSuggestion!
	analyzeMedia(id: ID!, forceReanalysis: Boolean! = false): Boolean!
	convertMedia(id: ID!): Boolean!
	deleteMedia(id: ID!): Media!
	favoriteMedia(id: ID!, isFavorite: Boolean!): Media!
	"""
	Update the thumbnail for a book. This will replace the existing thumbnail with the the one
	associated with the provided input (book). If the book does not have a thumbnail, one
	will be generated based on the library's thumbnail configuration.
	"""
	updateMediaThumbnail(id: ID!, input: PageBasedThumbnailInput!): Media!
	deleteMediaProgress(id: ID!): Media!
	"""
	Deletes all of a user's reading history for a specific media item. This cannot be undone, so
	use with caution.
	"""
	deleteMediaReadHistory(id: ID!): Media!
	updateMediaProgress(id: ID!, input: MediaProgressInput!): ReadingProgressOutput!
	markMediaAsComplete(id: ID!, isComplete: Boolean!, page: Int): FinishedReadingSessionModel
	updateMediaMetadata(id: ID!, input: MediaMetadataInput!): Media!
	"Search external metadata providers for a media item and return match candidates"
	fetchMediaMetadata(id: ID!): [MatchCandidate!]!
	"Accept a match candidate and apply it to media metadata"
	acceptMediaMatch(mediaId: ID!, candidateIndex: Int!, strategy: MergeStrategy, excludeFields: [MetadataField!], overrides: [MetadataFieldOverride!]): MetadataFetchRecord!
	"Reject the current match candidates for a media item"
	rejectMediaMatch(mediaId: ID!, candidateIndex: Int!): MetadataFetchRecord!
	"Set the locked metadata fields for a media item"
	setMediaLockedFields(mediaId: ID!, lockedFields: [MetadataField!]!): Media!
	updateSeriesMetadata(id: ID!, input: SeriesMetadataInput!): Series!
	resetSeriesMetadata(id: ID!, impact: MetadataResetImpact!): Series!
	"Search external metadata providers for a series and return match candidates"
	fetchSeriesMetadata(id: ID!): [MatchCandidate!]!
	"Accept a match candidate and apply it to the series metadata"
	acceptSeriesMatch(seriesId: ID!, candidateIndex: Int!, strategy: MergeStrategy, excludeFields: [MetadataField!], overrides: [MetadataFieldOverride!]): MetadataFetchRecord!
	"Reject the current match candidates for a series"
	rejectSeriesMatch(seriesId: ID!, candidateIndex: Int!): MetadataFetchRecord!
	"Set the locked metadata fields for a series"
	setSeriesLockedFields(seriesId: ID!, lockedFields: [MetadataField!]!): Series!
	analyzeLibrary(id: ID!, forceReanalysis: Boolean! = false): Boolean!
	"""
	Delete media and series from a library that match one of the following conditions:
	
	- A series that is missing from disk (status is not `Ready`)
	- A media that is missing from disk (status is not `Ready`)
	- A series that is not associated with any media (i.e., no media in the series)
	
	This operation will also remove any associated thumbnails of the deleted media and series.
	"""
	cleanLibrary(id: ID!): CleanLibraryResponse!
	"Clear the scan history for a specific library"
	clearScanHistory(id: ID!): Int!
	"""
	Create a new library with the provided configuration. If `scan_after_persist` is `true`,
	the library will be scanned immediately after creation.
	"""
	createLibrary(input: CreateOrUpdateLibraryInput!): Library!
	resetLibraryMetadata(id: ID!, impact: MetadataResetImpact!): Library!
	"""
	Update an existing library with the provided configuration. If `scan_after_persist` is `true`,
	the library will be scanned immediately after updating.
	"""
	updateLibrary(id: ID!, input: CreateOrUpdateLibraryInput!): Library!
	"Update the emoji for a library"
	updateLibraryEmoji(id: ID!, emoji: String): Library!
	"""
	Update the thumbnail for a library. This will replace the existing thumbnail with the the one
	associated with the provided input (book). If the book does not have a thumbnail, one
	will be generated based on the library's thumbnail configuration.
	"""
	updateLibraryThumbnail(id: ID!, input: UpdateThumbnailInput!): Library!
	"""
	Exclude users from a library, preventing them from seeing the library in the UI. This operates as a
	full replacement of the excluded users list, so any users not included in the provided list will be
	removed from the exclusion list if they were previously excluded.
	
	The server owner cannot be excluded from a library, nor can the user performing the action exclude
